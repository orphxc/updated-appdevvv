<h1 class="main-title">   Study Session Tracker</h1>

<div class="three-column-layout">
  

  <aside class="column side-col">
    <app-timer [notesRef]="studyNotes"></app-timer>
    <app-spotify-player></app-spotify-player>
  </aside>


  <main class="column workspace-col">
    <app-notes #studyNotes></app-notes>
    <app-flashcards></app-flashcards>
  </main>

  
  <aside class="column side-col">
    <app-session-list></app-session-list>
  </aside>

</div>
